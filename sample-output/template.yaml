AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  TaskManager API - Serverless backend generated by the Serverless API Accelerator prompt.
  Full production-grade infrastructure with security, monitoring, and cost controls.

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs20.x
    Handler: index.handler
    Tracing: Active
    Environment:
      Variables:
        TASKS_TABLE: !Ref TasksTable
        LOG_LEVEL: INFO
        POWERTOOLS_SERVICE_NAME: TaskManager
        POWERTOOLS_METRICS_NAMESPACE: TaskManager

  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"  # Restrict in production: "'https://yourdomain.com'"

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment name

  LogRetentionDays:
    Type: Number
    Default: 7
    Description: CloudWatch Logs retention period in days

  WAFBlockedIPList:
    Type: CommaDelimitedList
    Default: ""
    Description: Comma-separated list of IPs to block via WAF

Resources:
  # ============================================================================
  # DynamoDB Table
  # ============================================================================
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-tasks-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      EncryptionSpecification:
        SSESpecification:
          SSEEnabled: true
          SSEType: KMS
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Service
          Value: TaskManager
        - Key: CostCenter
          Value: ServerlessAPI

  # ============================================================================
  # Cognito User Pool
  # ============================================================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users-${EnvironmentName}"
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      DeletionProtection: ACTIVE
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${AWS::StackName}-client-${EnvironmentName}"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      PreventUserExistenceErrors: ENABLED
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30

  # ============================================================================
  # API Gateway HTTP API
  # ============================================================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref EnvironmentName
      FailOnWarnings: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50
        DetailedMetricsEnabled: true
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuthorizer
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ============================================================================
  # Lambda Functions
  # ============================================================================
  CreateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/createTask/
      Description: Create a new task
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
        - CloudWatchPutMetricPolicy: {}
      Environment:
        Variables:
          TASKS_TABLE: !Ref TasksTable
      Events:
        CreateTask:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
      ReservedConcurrentExecutions: 5
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Function
          Value: CreateTask

  GetTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/getTask/
      Description: Get a single task by ID
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TasksTable
        - CloudWatchPutMetricPolicy: {}
      Environment:
        Variables:
          TASKS_TABLE: !Ref TasksTable
      Events:
        GetTask:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks/{id}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
      ReservedConcurrentExecutions: 5
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Function
          Value: GetTask

  ListTasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/listTasks/
      Description: List all tasks for the authenticated user
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TasksTable
        - CloudWatchPutMetricPolicy: {}
      Environment:
        Variables:
          TASKS_TABLE: !Ref TasksTable
      Events:
        ListTasks:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer
      ReservedConcurrentExecutions: 5
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Function
          Value: ListTasks

  UpdateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/updateTask/
      Description: Update an existing task
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
        - CloudWatchPutMetricPolicy: {}
      Environment:
        Variables:
          TASKS_TABLE: !Ref TasksTable
      Events:
        UpdateTask:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks/{id}
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer
      ReservedConcurrentExecutions: 5
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Function
          Value: UpdateTask

  DeleteTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/deleteTask/
      Description: Delete a task
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
        - CloudWatchPutMetricPolicy: {}
      Environment:
        Variables:
          TASKS_TABLE: !Ref TasksTable
      Events:
        DeleteTask:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /tasks/{id}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer
      ReservedConcurrentExecutions: 5
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Function
          Value: DeleteTask

  # ============================================================================
  # WAF WebACL
  # ============================================================================
  HttpApiWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${AWS::StackName}-waf-${EnvironmentName}"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${AWS::StackName}-waf-metrics"
      Rules:
        - Name: IPRateLimit
          Priority: 0
          Statement:
            RateBasedStatement:
              Limit: 1000
              AggregateKeyType: IP
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-waf-rate-limit"
        - Name: AWS-AWSManagedRulesCommonRuleSet
          Priority: 1
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-waf-common-rules"
        - Name: AWS-AWSManagedRulesSQLiRuleSet
          Priority: 2
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-waf-sqli-rules"
        - Name: AWS-AWSManagedRulesKnownBadInputsRuleSet
          Priority: 3
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${AWS::StackName}-waf-known-bad-inputs"

  HttpApiWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      WebACLArn: !GetAtt HttpApiWebAcl.Arn
      ResourceArn: !Sub "arn:aws:apigateway:${AWS::Region}::/apis/${HttpApi}"

  # ============================================================================
  # CloudWatch Alarms
  # ============================================================================
  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-api-5xx-${EnvironmentName}"
      AlarmDescription: "API Gateway 5XX error rate exceeded 1%"
      Metrics:
        - Id: e1
          ReturnData: true
          Expression: "m2 / m1 * 100"
          Label: "5xxErrorRate"
        - Id: m1
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: AWS/ApiGateway
              MetricName: Count
              Dimensions:
                - Name: ApiId
                  Value: !Ref HttpApi
                - Name: Stage
                  Value: !Ref EnvironmentName
            Period: 300
            Stat: Sum
        - Id: m2
          ReturnData: false
          MetricStat:
            Metric:
              Namespace: AWS/ApiGateway
              MetricName: 5XXError
              Dimensions:
                - Name: ApiId
                  Value: !Ref HttpApi
                - Name: Stage
                  Value: !Ref EnvironmentName
            Period: 300
            Stat: Sum
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      EvaluationPeriods: 2
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-errors-${EnvironmentName}"
      AlarmDescription: "Any Lambda function error count > 0 in 5 minutes"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FunctionName
          Value: !Ref CreateTaskFunction

  LambdaErrorAlarmGetTask:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-errors-getTask-${EnvironmentName}"
      AlarmDescription: "GetTaskFunction error count > 0 in 5 minutes"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FunctionName
          Value: !Ref GetTaskFunction

  LambdaErrorAlarmListTasks:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-errors-listTasks-${EnvironmentName}"
      AlarmDescription: "ListTasksFunction error count > 0 in 5 minutes"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FunctionName
          Value: !Ref ListTasksFunction

  LambdaErrorAlarmUpdateTask:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-errors-updateTask-${EnvironmentName}"
      AlarmDescription: "UpdateTaskFunction error count > 0 in 5 minutes"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FunctionName
          Value: !Ref UpdateTaskFunction

  LambdaErrorAlarmDeleteTask:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-lambda-errors-deleteTask-${EnvironmentName}"
      AlarmDescription: "DeleteTaskFunction error count > 0 in 5 minutes"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: FunctionName
          Value: !Ref DeleteTaskFunction

  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-dynamodb-throttle-${EnvironmentName}"
      AlarmDescription: "DynamoDB throttled requests detected"
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic
      Dimensions:
        - Name: TableName
          Value: !Ref TasksTable

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-alarms-${EnvironmentName}"
      DisplayName: !Sub "${AWS::StackName} Alarms"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  AlarmTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref AlarmTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudwatch.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AlarmTopic

  # ============================================================================
  # Budget Alert (via Budgets)
  # ============================================================================
  BudgetAlert:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "${AWS::StackName}-budget-${EnvironmentName}"
        BudgetLimit:
          Amount: 50
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: "admin@example.com"  # CHANGE THIS to your email address

  # ============================================================================
  # KMS Key for Encryption
  # ============================================================================
  AppKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "KMS key for ${AWS::StackName}"
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: kms:*
            Resource: "*"
          - Sid: Allow Lambda Use
            Effect: Allow
            Principal:
              AWS:
                - !GetAtt CreateTaskFunction.Role.Arn
                - !GetAtt GetTaskFunction.Role.Arn
                - !GetAtt ListTasksFunction.Role.Arn
                - !GetAtt UpdateTaskFunction.Role.Arn
                - !GetAtt DeleteTaskFunction.Role.Arn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  AppKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-key-${EnvironmentName}"
      TargetKeyId: !Ref AppKey

  # ============================================================================
  # X-Ray Sampling Rule
  # ============================================================================
  XRaySamplingRule:
    Type: AWS::XRay::SamplingRule
    Properties:
      SamplingRule:
        RuleName: !Sub "${AWS::StackName}-sampling-${EnvironmentName}"
        ResourceARN: "*"
        Priority: 1
        FixedRate: 0.1
        ReservoirSize: 5
        ServiceName: TaskManager
        ServiceType: AWS::Lambda
        Host: "*"
        HTTPMethod: "*"
        URLPath: "*"
        Version: 1
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  ApiEndpoint:
    Description: "HTTP API endpoint URL"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}"

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient

  TasksTableName:
    Description: "DynamoDB Tasks table name"
    Value: !Ref TasksTable

  AlarmTopicArn:
    Description: "SNS Topic ARN for alarms"
    Value: !Ref AlarmTopic

  KmsKeyId:
    Description: "KMS Key ID"
    Value: !Ref AppKey

  StackRegion:
    Description: "Deployment region"
    Value: !Ref AWS::Region